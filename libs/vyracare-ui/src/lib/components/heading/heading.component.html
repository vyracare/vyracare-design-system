<div
  class="vc-heading"
  role="heading"
  [attr.aria-level]="level"
  [class.vc-heading--h1]="level === 1"
  [class.vc-heading--h2]="level === 2"
  [class.vc-heading--h3]="level === 3"
  [class.vc-heading--h4]="level === 4"
  [class.vc-heading--h5]="level === 5"
  [class.vc-heading--h6]="level === 6"
>
  <ng-content></ng-content>
</div>
