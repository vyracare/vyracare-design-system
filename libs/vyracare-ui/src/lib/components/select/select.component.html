<div class="vc-select">
  @if (label) {
    <label class="vc-label" [attr.for]="id">
      <span>{{ label }}</span>
      @if (required) {
        <span class="vc-label__required">*</span>
      }
    </label>
  }
  <div class="vc-select__field">
    <select
      class="vc-select__select"
      [id]="id"
      [disabled]="disabled"
      [required]="required"
      [value]="value"
      [class.invalid]="!!error"
      (change)="handleChange($event)"
      (blur)="markTouched()"
    >
      @if (placeholder) {
        <option value="" disabled [selected]="!value">{{ placeholder }}</option>
      }
      @for (option of options; track option.value) {
        <option [value]="option.value" [disabled]="option.disabled">
          {{ option.label }}
        </option>
      }
    </select>
    <vc-icon name="chevron-down" size="sm" [decorative]="true"></vc-icon>
  </div>
  @if (hint && !error) {
    <small class="vc-select__hint">{{ hint }}</small>
  }
  @if (error) {
    <small class="vc-select__error">{{ error }}</small>
  }
</div>
