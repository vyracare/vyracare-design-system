trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

variables:
  - group: aws-secrets
  - name: nodeVersion
    value: '20.x'
  - name: awsRegion
    value: 'us-east-1'
  - name: awsAccountId
    value: '510253726006'
  - name: codeArtifactDomain
    value: 'vyracare-design-system'
  - name: codeArtifactRepo
    value: 'vyracare-design-system'
  - name: s3BucketName
    value: 'vyracare-design-system-storybook'
  - name: cloudfrontDistributionId
    value: ''
  - name: githubServiceConnection
    value: 'github-vyracare'

resources:
  repositories:
    - repository: infraCloudfront
      type: github
      name: vyracare/vyracare-infra-cloudfront-bucket
      endpoint: github-vyracare

stages:
  - stage: ci
    displayName: CI
    jobs:
      - job: build_test
        displayName: Build and test
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - checkout: self

          - script: |
              set -euo pipefail
              root="$(Build.SourcesDirectory)"
              if [ -f "$root/package.json" ]; then
                echo "##vso[task.setvariable variable=WORKDIR]$root"
                exit 0
              fi
              pkg=$(find "$root" -maxdepth 3 -name package.json -print -quit)
              if [ -z "$pkg" ]; then
                echo "package.json not found under $root"
                exit 1
              fi
              echo "##vso[task.setvariable variable=WORKDIR]$(dirname "$pkg")"
            displayName: Resolve workdir

          - task: NodeTool@0
            inputs:
              versionSpec: $(nodeVersion)

          - script: |
              set -euo pipefail
              if [ ! -f package-lock.json ]; then
                echo "package-lock.json not found. Generating lockfile..."
                npm install --package-lock-only --legacy-peer-deps
              fi
            displayName: Ensure package-lock.json
            condition: succeeded()
            workingDirectory: $(WORKDIR)
            env:
              NPM_CONFIG_PRODUCTION: "false"
              NPM_CONFIG_OMIT: ""
              NODE_ENV: "development"

          - script: npm ci --legacy-peer-deps --include=dev --omit=optional --omit=peer
            displayName: Install dependencies
            condition: succeeded()
            env:
              NPM_CONFIG_LEGACY_PEER_DEPS: "true"
              NPM_CONFIG_PRODUCTION: "false"
              NPM_CONFIG_OMIT: ""
            workingDirectory: $(WORKDIR)

          - script: npm run test
            displayName: Run unit tests
            workingDirectory: $(WORKDIR)

          - script: npm run build
            displayName: Build library
            workingDirectory: $(WORKDIR)

          - script: npm run storybook:build
            displayName: Build Storybook
            workingDirectory: $(WORKDIR)

          - publish: $(WORKDIR)/dist
            artifact: dist

          - publish: $(WORKDIR)/dist/storybook
            artifact: storybook

  - stage: release
    displayName: Release
    dependsOn: ci
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'), ne(variables['Build.Reason'], 'PullRequest'))
    jobs:
      - job: publish
        displayName: Publish package and Storybook
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - checkout: self

          - script: |
              set -euo pipefail
              root="$(Build.SourcesDirectory)"
              if [ -f "$root/package.json" ]; then
                echo "##vso[task.setvariable variable=WORKDIR]$root"
                exit 0
              fi
              pkg=$(find "$root" -maxdepth 3 -name package.json -print -quit)
              if [ -z "$pkg" ]; then
                echo "package.json not found under $root"
                exit 1
              fi
              echo "##vso[task.setvariable variable=WORKDIR]$(dirname "$pkg")"
            displayName: Resolve workdir

          - task: NodeTool@0
            inputs:
              versionSpec: $(nodeVersion)

          - script: |
              set -euo pipefail
              aws --version
            displayName: Check AWS CLI

          - script: |
              set -euo pipefail
              if ! command -v terraform >/dev/null 2>&1; then
                sudo apt-get update -y
                sudo apt-get install -y unzip
                curl -fsSL https://releases.hashicorp.com/terraform/1.9.2/terraform_1.9.2_linux_amd64.zip -o terraform.zip
                unzip terraform.zip
                sudo mv terraform /usr/local/bin/
                rm -f terraform.zip
              fi
              terraform -version
            displayName: Install Terraform

          - script: |
              set -euo pipefail
              if [ -z "${AWS_ACCESS_KEY_ID:-}" ] || [ -z "${AWS_SECRET_ACCESS_KEY:-}" ]; then
                echo "Missing AWS credentials. Set AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY as pipeline secrets."
                exit 1
              fi
            displayName: Validate AWS credentials
            env:
              AWS_ACCESS_KEY_ID: $(AWS_ACCESS_KEY_ID)
              AWS_SECRET_ACCESS_KEY: $(AWS_SECRET_ACCESS_KEY)

          - script: |
              set -euo pipefail
              if ! aws codeartifact describe-domain --domain "$(codeArtifactDomain)" --region "$(awsRegion)" >/dev/null 2>&1; then
                aws codeartifact create-domain --domain "$(codeArtifactDomain)" --region "$(awsRegion)" >/dev/null 2>&1 || true
                if ! aws codeartifact describe-domain --domain "$(codeArtifactDomain)" --region "$(awsRegion)" >/dev/null 2>&1; then
                  echo "Failed to access or create CodeArtifact domain $(codeArtifactDomain)."
                  exit 1
                fi
              fi
              if ! aws codeartifact describe-repository --domain "$(codeArtifactDomain)" --repository "$(codeArtifactRepo)" --region "$(awsRegion)" >/dev/null 2>&1; then
                aws codeartifact create-repository \
                  --domain "$(codeArtifactDomain)" \
                  --repository "$(codeArtifactRepo)" \
                  --region "$(awsRegion)" >/dev/null 2>&1 || true
                if ! aws codeartifact describe-repository --domain "$(codeArtifactDomain)" --repository "$(codeArtifactRepo)" --region "$(awsRegion)" >/dev/null 2>&1; then
                  echo "Failed to access or create CodeArtifact repository $(codeArtifactRepo)."
                  exit 1
                fi
              fi
            displayName: Ensure CodeArtifact domain/repo
            env:
              AWS_ACCESS_KEY_ID: $(AWS_ACCESS_KEY_ID)
              AWS_SECRET_ACCESS_KEY: $(AWS_SECRET_ACCESS_KEY)

          - script: |
              set -euo pipefail

              bucket_name="$(s3BucketName)"
              region="$(awsRegion)"

              if aws s3api head-bucket --bucket "$bucket_name" >/dev/null 2>&1; then
                s3_exists="true"
              else
                s3_exists="false"
              fi

              cloudfront_id=$(aws cloudfront list-distributions --query "DistributionList.Items[?contains(Origins.Items[0].DomainName, '${bucket_name}')].Id | [0]" --output text)
              if [ -z "$cloudfront_id" ] || [ "$cloudfront_id" = "None" ]; then
                cloudfront_id=""
              fi

              echo "S3 exists: $s3_exists"
              echo "CloudFront ID: ${cloudfront_id:-none}"

              if [ "$s3_exists" = "true" ] && [ -n "$cloudfront_id" ]; then
                echo "##vso[task.setvariable variable=NEED_INFRA]false"
                echo "##vso[task.setvariable variable=CLOUDFRONT_DISTRIBUTION_ID]$cloudfront_id"
              else
                echo "##vso[task.setvariable variable=NEED_INFRA]true"
              fi
            displayName: Detect bucket and CloudFront
            env:
              AWS_ACCESS_KEY_ID: $(AWS_ACCESS_KEY_ID)
              AWS_SECRET_ACCESS_KEY: $(AWS_SECRET_ACCESS_KEY)

          - checkout: infraCloudfront
            path: infra-cloudfront
            displayName: Checkout infra cloudfront bucket
            condition: and(succeeded(), eq(variables['NEED_INFRA'], 'true'))

          - script: |
              set -euo pipefail

              cd "$(Pipeline.Workspace)/infra-cloudfront"
              terraform init

              bucket_name="$(s3BucketName)"
              region="$(awsRegion)"
              comment="${bucket_name} em Angular CloudFront"

              if aws s3api head-bucket --bucket "$bucket_name" >/dev/null 2>&1; then
                terraform import aws_s3_bucket.app_bucket "$bucket_name" || true
              fi

              terraform apply -auto-approve \
                -var "project_name=$bucket_name" \
                -var "region=$region" \
                -var "cloudfront_comment=$comment"

              cloudfront_id=$(terraform output -raw cloudfront_distribution_id)
              echo "##vso[task.setvariable variable=CLOUDFRONT_DISTRIBUTION_ID]$cloudfront_id"
            displayName: Provision S3 + CloudFront (Terraform)
            condition: and(succeeded(), eq(variables['NEED_INFRA'], 'true'))
            env:
              AWS_ACCESS_KEY_ID: $(AWS_ACCESS_KEY_ID)
              AWS_SECRET_ACCESS_KEY: $(AWS_SECRET_ACCESS_KEY)

          - script: |
              set -euo pipefail
              if [ ! -f package-lock.json ]; then
                echo "package-lock.json not found. Generating lockfile..."
                npm install --package-lock-only --legacy-peer-deps
              fi
            displayName: Ensure package-lock.json
            condition: succeeded()
            workingDirectory: $(WORKDIR)
            env:
              NPM_CONFIG_PRODUCTION: "false"
              NPM_CONFIG_OMIT: ""
              NODE_ENV: "development"

          - script: |
              set -euo pipefail
              npm config set registry https://registry.npmjs.org/
            displayName: Use npmjs registry for install

          - script: npm ci --legacy-peer-deps --include=dev --omit=optional --omit=peer
            displayName: Install dependencies
            condition: succeeded()
            env:
              NPM_CONFIG_LEGACY_PEER_DEPS: "true"
              NPM_CONFIG_PRODUCTION: "false"
              NPM_CONFIG_OMIT: ""
            workingDirectory: $(WORKDIR)

          - script: npm run build
            displayName: Build library
            workingDirectory: $(WORKDIR)

          - script: npm run storybook:build
            displayName: Build Storybook
            workingDirectory: $(WORKDIR)

          - script: |
              set -euo pipefail
              aws codeartifact login \
                --tool npm \
                --domain "$(codeArtifactDomain)" \
                --domain-owner "$(awsAccountId)" \
                --repository "$(codeArtifactRepo)" \
                --region "$(awsRegion)"
            displayName: Login to CodeArtifact

          - script: npm run release
            displayName: Publish to CodeArtifact
            workingDirectory: $(WORKDIR)

          - script: |
              set -euo pipefail
              aws s3 sync "$(WORKDIR)/dist/storybook" "s3://$(s3BucketName)" --delete
            displayName: Deploy Storybook to S3

          - script: |
              set -euo pipefail
              if [ -n "$(CLOUDFRONT_DISTRIBUTION_ID)" ]; then
                aws cloudfront create-invalidation --distribution-id "$(CLOUDFRONT_DISTRIBUTION_ID)" --paths "/*"
              else
                echo "Skipping CloudFront invalidation (cloudfrontDistributionId not set)."
              fi
            displayName: Invalidate CloudFront cache
