<section class="page">
  <vc-heading [level]="2">Componentes</vc-heading>
  <vc-text>
    Explore cada componente em uma pagina dedicada com exemplos de uso, variacoes
    e comportamento recomendado.
  </vc-text>

  <div class="page__grid">
    @for (component of components; track component.path) {
      <a class="component-link" [routerLink]="component.path">
        <vc-card>
          <div class="component-link__content">
            <span class="component-link__icon">
              <vc-icon [name]="component.icon" size="lg" [decorative]="true"></vc-icon>
            </span>
            <div>
              <vc-heading [level]="4">{{ component.title }}</vc-heading>
              <vc-text [muted]="true">{{ component.description }}</vc-text>
            </div>
          </div>
        </vc-card>
      </a>
    }
  </div>
</section>
