<div class="playground">
  <aside class="playground__sidebar">
    <div class="playground__brand-row">
      <div class="playground__brand">
        <span>Vyracare</span>
        <strong>Design System</strong>
      </div>
      <button
        type="button"
        class="playground__theme-toggle"
        (click)="toggleTheme()"
        [attr.aria-label]="theme() === 'dark' ? 'Ativar tema claro' : 'Ativar tema escuro'"
      >
        <vc-icon [name]="themeIcon()" size="md" [decorative]="true"></vc-icon>
      </button>
    </div>
    <nav class="playground__nav">
      <a
        routerLink=""
        routerLinkActive="is-active"
        [routerLinkActiveOptions]="{ exact: true }"
      >
        Visao geral
      </a>

      <div
        class="playground__nav-group"
        routerLinkActive="is-active"
        #componentsGroup="routerLinkActive"
      >
        <button
          type="button"
          class="playground__nav-toggle"
          [class.is-active]="componentsGroup.isActive"
          [attr.aria-expanded]="componentsMenuOpen()"
          (click)="toggleComponentsMenu()"
        >
          <span>Componentes</span>
          <vc-icon
            [name]="componentsMenuOpen() ? 'chevron-up' : 'chevron-down'"
            size="sm"
            [decorative]="true"
          ></vc-icon>
        </button>

        @if (componentsMenuOpen()) {
          <div class="playground__nav-submenu">
            @for (link of componentLinks; track link.path) {
              <a
                [routerLink]="link.path"
                routerLinkActive="is-active"
                [routerLinkActiveOptions]="{ exact: link.path === 'componentes' }"
              >
                {{ link.label }}
              </a>
            }
          </div>
        }
      </div>

      @for (link of links; track link.path) {
        <a
          [routerLink]="link.path"
          routerLinkActive="is-active"
          [routerLinkActiveOptions]="{ exact: link.path === '' }"
        >
          {{ link.label }}
        </a>
      }
    </nav>
  </aside>

  <main class="playground__content">
    <router-outlet></router-outlet>
  </main>
</div>
